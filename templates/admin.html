<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>网上订餐系统 - 后台管理</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        :root {
            --mint: #4FD1C5;
            --mint-dark: #38B2AC;
            --mint-glow: rgba(79,209,197,0.25);
            --mint-light: rgba(79,209,197,0.08);
            --coral: #ED64A6;
            --coral-dark: #D53F8C;
            --lavender: #9F7AEA;
            --amber: #DD6B20;
            --bg-dark: #F4F6FB;
            --bg-card: #FFFFFF;
            --bg-card-hover: #EDF2F7;
            --bg-input: #EDF2F7;
            --text-primary: #1A202C;
            --text-secondary: #4A5568;
            --text-muted: #A0AEC0;
            --border: rgba(79,209,197,0.18);
            --border-hover: rgba(79,209,197,0.35);
            --glass-bg: rgba(255,255,255,0.72);
            --glass-border: rgba(79,209,197,0.12);
            --glass-blur: blur(20px);
            --radius-sm: 10px;
            --radius-md: 16px;
            --radius-lg: 20px;
            --radius-xl: 28px;
            --shadow-card: 0 2px 16px rgba(79,209,197,0.06);
            --shadow-hover: 0 8px 32px rgba(79,209,197,0.10);
            --gradient-main: linear-gradient(135deg, #4FD1C5, #38B2AC);
            --gradient-warm: linear-gradient(135deg, #F687B3, #B794F6);
            --gradient-amber: linear-gradient(135deg, #F6AD55, #F687B3);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', 'Microsoft YaHei', 'PingFang SC', sans-serif; background: var(--bg-dark); color: var(--text-primary); position: relative; overflow-x: hidden; min-height: 100vh; }
        body::before { content: ''; position: fixed; top: -20%; right: -10%; width: 50vw; height: 50vw; background: radial-gradient(circle, rgba(79,209,197,0.10) 0%, transparent 65%); border-radius: 50%; z-index: 0; pointer-events: none; }
        body::after { content: ''; position: fixed; bottom: -15%; left: -5%; width: 40vw; height: 40vw; background: radial-gradient(circle, rgba(246,135,179,0.08) 0%, transparent 65%); border-radius: 50%; z-index: 0; pointer-events: none; }
        .dot-pattern { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; opacity: 0.06; background-image: radial-gradient(circle, var(--mint) 1px, transparent 1px); background-size: 30px 30px; }
        .layout { display: flex; min-height: 100vh; position: relative; z-index: 1; }
        .sidebar { width: 220px; background: var(--glass-bg); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); color: var(--text-primary); padding: 20px 0; position: fixed; height: 100vh; overflow-y: auto; border-right: 1px solid var(--border); z-index: 10; }
        .sidebar h2 { padding: 15px 25px; font-size: 17px; border-bottom: 1px solid var(--border); margin-bottom: 10px; background: var(--gradient-main); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; font-weight: 700; }
        .nav-item { padding: 12px 25px; cursor: pointer; transition: all 0.2s; font-size: 14px; display: flex; align-items: center; gap: 10px; color: var(--text-secondary); border-radius: 0 var(--radius-xl) var(--radius-xl) 0; margin-right: 12px; }
        .nav-item:hover { background: var(--mint-light); color: var(--mint); }
        .nav-item.active { background: var(--mint-light); color: var(--mint); font-weight: 600; }
        .main { margin-left: 220px; flex: 1; padding: 25px; position: relative; z-index: 1; }
        .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .page-header h2 { font-size: 22px; font-weight: 600; }
        .btn { padding: 8px 18px; border: none; border-radius: var(--radius-sm); cursor: pointer; font-size: 13px; transition: all 0.25s; font-weight: 500; letter-spacing: 0.25px; }
        .btn-primary { background: var(--gradient-main); color: #fff; }
        .btn-primary:hover { box-shadow: 0 4px 20px var(--mint-glow); transform: translateY(-1px); }
        .btn-danger { background: linear-gradient(135deg, #FC8181, #F56565); color: #fff; }
        .btn-danger:hover { box-shadow: 0 4px 16px rgba(245,101,101,0.3); }
        .btn-success { background: var(--gradient-main); color: #fff; }
        .btn-info { background: var(--gradient-main); color: #fff; }
        .btn-warning { background: var(--gradient-amber); color: #fff; }
        .btn-sm { padding: 5px 12px; font-size: 12px; }
        .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text-secondary); }
        .btn-ghost:hover { border-color: var(--mint); color: var(--mint); }
        .card { background: var(--bg-card); border-radius: var(--radius-md); padding: 20px; margin-bottom: 20px; border: 1px solid var(--border); }
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 25px; }
        .stat-card { background: var(--bg-card); border-radius: var(--radius-md); padding: 20px; border: 1px solid var(--border); transition: all 0.3s; }
        .stat-card:hover { border-color: var(--border-hover); box-shadow: var(--shadow-hover); }
        .stat-card .label { font-size: 12px; color: var(--text-muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; }
        .stat-card .value { font-size: 28px; font-weight: 700; }
        .stat-card:nth-child(1) .value { color: #2C9E94; }
        .stat-card:nth-child(2) .value { color: #ED64A6; }
        .stat-card:nth-child(3) .value { color: #805AD5; }
        .stat-card:nth-child(4) .value { color: #DD6B20; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid var(--border); font-size: 13px; }
        th { background: rgba(79,209,197,0.06); font-weight: 600; color: var(--text-muted); font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
        tr:hover { background: var(--mint-light); }
        td { color: var(--text-secondary); }
        .badge { padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
        .badge-success { background: rgba(79,209,197,0.15); color: #2C9E94; }
        .badge-danger { background: rgba(229,62,62,0.10); color: #E53E3E; }
        .badge-warning { background: rgba(221,107,32,0.12); color: #DD6B20; }
        .badge-info { background: var(--mint-light); color: #2C9E94; }
        .badge-purple { background: rgba(128,90,213,0.12); color: #805AD5; }
        .badge-primary { background: var(--mint-light); color: #2C9E94; }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(244,246,251,0.75); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); z-index: 200; align-items: center; justify-content: center; }
        .modal-overlay.show { display: flex; }
        .modal { background: var(--bg-card); border-radius: var(--radius-lg); padding: 25px; width: 480px; max-width: 90%; border: 1px solid var(--border); box-shadow: 0 20px 60px rgba(79,209,197,0.12); }
        .modal h3 { margin-bottom: 20px; font-size: 18px; font-weight: 600; background: var(--gradient-main); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; margin-bottom: 6px; font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 9px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 13px; outline: none; background: var(--bg-input); color: var(--text-primary); transition: all 0.2s; }
        .form-group input::placeholder, .form-group select::placeholder, .form-group textarea::placeholder { color: var(--text-muted); }
        .form-group input:focus, .form-group select:focus { border-color: var(--mint); box-shadow: 0 0 0 3px rgba(79,209,197,0.1); }
        .form-group select option { background: var(--bg-card); color: var(--text-primary); }
        .img-upload-area { display: flex; align-items: center; gap: 12px; }
        .img-preview { width: 60px; height: 60px; border-radius: var(--radius-sm); object-fit: cover; border: 1px solid var(--border); background: var(--bg-input); display: flex; align-items: center; justify-content: center; color: var(--text-muted); font-size: 24px; overflow: hidden; }
        .img-preview img { width: 100%; height: 100%; object-fit: cover; }
        .thumb { width: 40px; height: 40px; border-radius: var(--radius-sm); object-fit: cover; }
        .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
        .section { display: none; }
        .section.active { display: block; }
        .toast { position: fixed; top: 20px; right: 20px; padding: 12px 24px; background: var(--bg-card); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); color: var(--text-primary); border-radius: var(--radius-sm); z-index: 300; transform: translateX(120%); transition: transform 0.3s; font-size: 13px; border: 1px solid var(--border); }
        .toast.show { transform: translateX(0); }
        .toast.error { border-color: rgba(229,62,62,0.2); color: #E53E3E; }
        .login-page { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: var(--bg-dark); position: relative; overflow: hidden; }
        .login-page::before { content: ''; position: absolute; top: -20%; left: -10%; width: 50vw; height: 50vw; background: radial-gradient(circle, rgba(79,209,197,0.15) 0%, transparent 65%); border-radius: 50%; }
        .login-page::after { content: ''; position: absolute; bottom: -15%; right: -10%; width: 45vw; height: 45vw; background: radial-gradient(circle, rgba(182,148,246,0.12) 0%, transparent 65%); border-radius: 50%; }
        .login-box { background: var(--glass-bg); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); border-radius: var(--radius-lg); padding: 40px; width: 380px; box-shadow: 0 20px 60px rgba(79,209,197,0.10); border: 1px solid var(--border); position: relative; z-index: 1; }
        .login-box h2 { text-align: center; margin-bottom: 25px; background: var(--gradient-main); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; font-size: 20px; font-weight: 600; }
        .status-select { padding: 4px 8px; border-radius: var(--radius-sm); border: 1px solid var(--border); font-size: 12px; background: var(--bg-input); color: var(--text-primary); outline: none; }
        .status-select option { background: var(--bg-card); color: var(--text-primary); }
    </style>
</head>
<body>
    <div class="dot-pattern"></div>
    <div id="loginPage" class="login-page">
        <div class="login-box">
            <h2>后台管理登录</h2>
            <div class="form-group">
                <label>用户名</label>
                <input type="text" id="loginUsername" value="admin">
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" id="loginPassword" value="admin123">
            </div>
            <button class="btn btn-primary" style="width:100%;padding:12px;font-size:15px;margin-top:10px" onclick="adminLogin()">登录</button>
        </div>
    </div>

    <div id="adminPage" style="display:none">
        <div class="layout">
            <div class="sidebar">
                <h2>订餐后台</h2>
                <div class="nav-item active" onclick="switchSection('dashboard')"> 数据概览</div>
                <div class="nav-item" onclick="switchSection('categories')"> 分类管理</div>
                <div class="nav-item" onclick="switchSection('dishes')"> 菜品管理</div>
                <div class="nav-item" onclick="switchSection('orders')"> 订单管理</div>
                <div class="nav-item" onclick="switchSection('users')"> 用户管理</div>
                <div class="nav-item" style="margin-top:30px;border-top:1px solid var(--border);padding-top:15px" onclick="adminLogout()">🚪 退出登录</div>
            </div>
            <div class="main">
                <div id="dashboardSection" class="section active"></div>
                <div id="categoriesSection" class="section"></div>
                <div id="dishesSection" class="section"></div>
                <div id="ordersSection" class="section"></div>
                <div id="usersSection" class="section"></div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="modal">
        <div class="modal">
            <h3 id="modalTitle"></h3>
            <div id="modalBody"></div>
            <div class="modal-actions">
                <button class="btn btn-ghost" onclick="closeModal()">取消</button>
                <button class="btn btn-primary" id="modalSaveBtn" onclick="modalSave()">保存</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const API = '/api';
        let token = null;
        let currentSection = 'dashboard';
        let modalCallback = null;

        async function api(path, options = {}) {
            const headers = { 'Content-Type': 'application/json' };
            if (token) headers['Authorization'] = 'Bearer ' + token;
            const res = await fetch(API + path, { ...options, headers });
            const data = await res.json();
            if (!res.ok) throw new Error(data.error || '请求失败');
            return data;
        }

        function showToast(msg, isError = false) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.className = 'toast show' + (isError ? ' error' : '');
            setTimeout(() => t.className = 'toast', 2500);
        }

        async function adminLogin() {
            try {
                const data = await api('/login', {
                    method: 'POST',
                    body: JSON.stringify({
                        username: document.getElementById('loginUsername').value,
                        password: document.getElementById('loginPassword').value
                    })
                });
                if (data.user.role !== 'admin') throw new Error('非管理员账号');
                token = data.token;
                document.getElementById('loginPage').style.display = 'none';
                document.getElementById('adminPage').style.display = 'block';
                loadDashboard();
            } catch (e) { showToast(e.message, true); }
        }

        function adminLogout() {
            token = null;
            document.getElementById('adminPage').style.display = 'none';
            document.getElementById('loginPage').style.display = 'flex';
        }

        function switchSection(name) {
            currentSection = name;
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            event.target.classList.add('active');
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(name + 'Section').classList.add('active');
            const loaders = { dashboard: loadDashboard, categories: loadCategories, dishes: loadDishes, orders: loadOrders, users: loadUsers };
            if (loaders[name]) loaders[name]();
        }

        async function loadDashboard() {
            try {
                const [dishes, orders, users, categories] = await Promise.all([
                    api('/admin/dishes'),
                    api('/admin/orders'),
                    api('/admin/users'),
                    api('/categories')
                ]);
                const pending = orders.filter(o => o.status === 'pending').length;
                const todayTotal = orders.filter(o => o.status !== 'cancelled').reduce((s, o) => s + o.total, 0);
                document.getElementById('dashboardSection').innerHTML = `
                    <div class="page-header"><h2>数据概览</h2></div>
                    <div class="stats-grid">
                        <div class="stat-card"><div class="label">菜品总数</div><div class="value">${dishes.length}</div></div>
                        <div class="stat-card"><div class="label">订单总数</div><div class="value">${orders.length}</div></div>
                        <div class="stat-card"><div class="label">营业额</div><div class="value">¥${todayTotal.toFixed(0)}</div></div>
                        <div class="stat-card"><div class="label">待处理</div><div class="value">${pending}</div></div>
                    </div>
                    <div class="card">
                        <h3 style="margin-bottom:15px;font-size:15px;font-weight:600">最近订单</h3>
                        <table>
                            <tr><th>订单号</th><th>用户</th><th>金额</th><th>状态</th><th>时间</th></tr>
                            ${orders.slice(0, 10).map(o => `
                                <tr>
                                    <td>#${String(o.id).padStart(6,'0')}</td>
                                    <td>${o.user?.username || '-'}</td>
                                    <td>¥${o.total.toFixed(2)}</td>
                                    <td><span class="badge badge-${getStatusBadge(o.status)}">${getStatusText(o.status)}</span></td>
                                    <td>-</td>
                                </tr>
                            `).join('')}
                        </table>
                    </div>
                `;
            } catch (e) { showToast(e.message, true); }
        }

        function getStatusText(s) { return {pending:'待处理',confirmed:'已确认',preparing:'制作中',delivering:'配送中',completed:'已完成',cancelled:'已取消'}[s] || s; }
        function getStatusBadge(s) { return {pending:'warning',confirmed:'info',preparing:'purple',delivering:'success',completed:'primary',cancelled:'danger'}[s] || 'info'; }

        async function loadCategories() {
            try {
                const cats = await api('/categories');
                document.getElementById('categoriesSection').innerHTML = `
                    <div class="page-header"><h2>分类管理</h2><button class="btn btn-primary" onclick="showCategoryModal()">+ 新增分类</button></div>
                    <div class="card">
                        <table>
                            <tr><th>ID</th><th>分类名称</th><th>排序</th><th>操作</th></tr>
                            ${cats.map(c => `
                                <tr>
                                    <td>${c.id}</td><td>${c.name}</td><td>${c.sort}</td>
                                    <td>
                                        <button class="btn btn-info btn-sm" onclick='editCategory(${JSON.stringify(c)})'>编辑</button>
                                        <button class="btn btn-danger btn-sm" onclick="deleteCategory(${c.id})">删除</button>
                                    </td>
                                </tr>
                            `).join('')}
                        </table>
                    </div>
                `;
            } catch (e) { showToast(e.message, true); }
        }

        function showCategoryModal(cat = null) {
            document.getElementById('modalTitle').textContent = cat ? '编辑分类' : '新增分类';
            document.getElementById('modalBody').innerHTML = `
                <div class="form-group"><label>分类名称</label><input id="m_catName" value="${cat ? cat.name : ''}"></div>
                <div class="form-group"><label>排序</label><input type="number" id="m_catSort" value="${cat ? cat.sort : 0}"></div>
            `;
            modalCallback = async () => {
                const body = { name: document.getElementById('m_catName').value, sort: parseInt(document.getElementById('m_catSort').value) || 0 };
                if (cat) await api(`/admin/categories/${cat.id}`, { method: 'PUT', body: JSON.stringify(body) });
                else await api('/admin/categories', { method: 'POST', body: JSON.stringify(body) });
                loadCategories();
            };
            document.getElementById('modal').classList.add('show');
        }

        function editCategory(cat) { showCategoryModal(cat); }

        async function deleteCategory(id) {
            if (!confirm('确定删除此分类？')) return;
            try { await api(`/admin/categories/${id}`, { method: 'DELETE' }); loadCategories(); showToast('删除成功'); }
            catch (e) { showToast(e.message, true); }
        }

        async function loadDishes() {
            try {
                const [dishes, cats] = await Promise.all([api('/admin/dishes'), api('/categories')]);
                const catMap = {};
                cats.forEach(c => catMap[c.id] = c.name);
                document.getElementById('dishesSection').innerHTML = `
                    <div class="page-header"><h2>菜品管理</h2><button class="btn btn-primary" onclick="showDishModal()">+ 新增菜品</button></div>
                    <div class="card">
                        <table>
                            <tr><th>ID</th><th>图片</th><th>名称</th><th>分类</th><th>价格</th><th>状态</th><th>操作</th></tr>
                            ${dishes.map(d => `
                                <tr>
                                    <td>${d.id}</td>
                                    <td>${d.image ? `<img src="${d.image}" class="thumb">` : '<span style="color:var(--text-muted)">-</span>'}</td>
                                    <td>${d.name}</td><td>${catMap[d.category_id] || '-'}</td>
                                    <td>¥${d.price.toFixed(2)}</td>
                                    <td><span class="badge ${d.status ? 'badge-success' : 'badge-danger'}">${d.status ? '上架' : '下架'}</span></td>
                                    <td>
                                        <button class="btn btn-info btn-sm" onclick='editDish(${JSON.stringify(d)})'>编辑</button>
                                        <button class="btn btn-sm ${d.status ? 'btn-warning' : 'btn-success'}" onclick="toggleDish(${d.id}, ${!d.status})">${d.status ? '下架' : '上架'}</button>
                                        <button class="btn btn-danger btn-sm" onclick="deleteDish(${d.id})">删除</button>
                                    </td>
                                </tr>
                            `).join('')}
                        </table>
                    </div>
                `;
            } catch (e) { showToast(e.message, true); }
        }

        function showDishModal(dish = null) {
            document.getElementById('modalTitle').textContent = dish ? '编辑菜品' : '新增菜品';
            api('/categories').then(cats => {
                document.getElementById('modalBody').innerHTML = `
                    <div class="form-group"><label>菜品名称</label><input id="m_dishName" value="${dish ? dish.name : ''}"></div>
                    <div class="form-group"><label>价格</label><input type="number" step="0.01" id="m_dishPrice" value="${dish ? dish.price : ''}"></div>
                    <div class="form-group"><label>分类</label><select id="m_dishCat">${cats.map(c => `<option value="${c.id}" ${dish && dish.category_id === c.id ? 'selected' : ''}>${c.name}</option>`).join('')}</select></div>
                    <div class="form-group"><label>描述</label><input id="m_dishDesc" value="${dish ? (dish.desc || '') : ''}"></div>
                    <div class="form-group">
                        <label>图片</label>
                        <div class="img-upload-area">
                            <div class="img-preview" id="imgPreview">${dish && dish.image ? `<img src="${dish.image}">` : '📷'}</div>
                            <input type="file" id="m_dishFile" accept="image/*" onchange="previewImage(this)">
                        </div>
                        <input type="hidden" id="m_dishImg" value="${dish ? (dish.image || '') : ''}">
                    </div>
                `;
            });
            modalCallback = async () => {
                const fileInput = document.getElementById('m_dishFile');
                if (fileInput.files.length > 0) {
                    const formData = new FormData();
                    formData.append('image', fileInput.files[0]);
                    try {
                        const res = await fetch('/api/admin/upload', {
                            method: 'POST',
                            headers: { 'Authorization': 'Bearer ' + token },
                            body: formData
                        });
                        const data = await res.json();
                        if (res.ok) {
                            document.getElementById('m_dishImg').value = data.url;
                        } else {
                            throw new Error(data.error || '图片上传失败');
                        }
                    } catch (e) { showToast(e.message, true); return; }
                }
                const body = {
                    name: document.getElementById('m_dishName').value,
                    price: parseFloat(document.getElementById('m_dishPrice').value),
                    category_id: parseInt(document.getElementById('m_dishCat').value),
                    desc: document.getElementById('m_dishDesc').value,
                    image: document.getElementById('m_dishImg').value
                };
                if (dish) await api(`/admin/dishes/${dish.id}`, { method: 'PUT', body: JSON.stringify(body) });
                else await api('/admin/dishes', { method: 'POST', body: JSON.stringify(body) });
                loadDishes();
            };
            document.getElementById('modal').classList.add('show');
        }

        function editDish(dish) { showDishModal(dish); }

        function previewImage(input) {
            const preview = document.getElementById('imgPreview');
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    preview.innerHTML = `<img src="${e.target.result}">`;
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        async function toggleDish(id, status) {
            try { await api(`/admin/dishes/${id}`, { method: 'PUT', body: JSON.stringify({ status }) }); loadDishes(); }
            catch (e) { showToast(e.message, true); }
        }

        async function deleteDish(id) {
            if (!confirm('确定删除此菜品？')) return;
            try { await api(`/admin/dishes/${id}`, { method: 'DELETE' }); loadDishes(); showToast('删除成功'); }
            catch (e) { showToast(e.message, true); }
        }

        async function loadOrders() {
            try {
                const orders = await api('/admin/orders');
                document.getElementById('ordersSection').innerHTML = `
                    <div class="page-header"><h2>订单管理</h2></div>
                    <div class="card">
                        <table>
                            <tr><th>订单号</th><th>用户</th><th>菜品</th><th>金额</th><th>状态</th><th>地址</th><th>操作</th></tr>
                            ${orders.map(o => `
                                <tr>
                                    <td>#${String(o.id).padStart(6,'0')}</td>
                                    <td>${o.user?.username || '-'}</td>
                                    <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${o.items.map(i => i.dish_name + 'x' + i.count).join(', ')}</td>
                                    <td>¥${o.total.toFixed(2)}</td>
                                    <td><span class="badge badge-${getStatusBadge(o.status)}">${getStatusText(o.status)}</span></td>
                                    <td style="max-width:150px;overflow:hidden;text-overflow:ellipsis">${o.address || '-'}</td>
                                    <td>
                                        <select class="status-select" onchange="updateOrderStatus(${o.id}, this.value)">
                                            <option value="pending" ${o.status==='pending'?'selected':''}>待处理</option>
                                            <option value="confirmed" ${o.status==='confirmed'?'selected':''}>已确认</option>
                                            <option value="preparing" ${o.status==='preparing'?'selected':''}>制作中</option>
                                            <option value="delivering" ${o.status==='delivering'?'selected':''}>配送中</option>
                                            <option value="completed" ${o.status==='completed'?'selected':''}>已完成</option>
                                            <option value="cancelled" ${o.status==='cancelled'?'selected':''}>已取消</option>
                                        </select>
                                    </td>
                                </tr>
                            `).join('')}
                        </table>
                    </div>
                `;
            } catch (e) { showToast(e.message, true); }
        }

        async function updateOrderStatus(id, status) {
            try { await api(`/admin/orders/${id}/status`, { method: 'PUT', body: JSON.stringify({ status }) }); loadOrders(); showToast('状态已更新'); }
            catch (e) { showToast(e.message, true); }
        }

        async function loadUsers() {
            try {
                const users = await api('/admin/users');
                document.getElementById('usersSection').innerHTML = `
                    <div class="page-header"><h2>用户管理</h2></div>
                    <div class="card">
                        <table>
                            <tr><th>ID</th><th>用户名</th><th>角色</th><th>手机号</th><th>地址</th></tr>
                            ${users.map(u => `
                                <tr>
                                    <td>${u.id}</td><td>${u.username}</td>
                                    <td><span class="badge ${u.role === 'admin' ? 'badge-purple' : 'badge-info'}">${u.role === 'admin' ? '管理员' : '顾客'}</span></td>
                                    <td>${u.phone || '-'}</td><td>${u.address || '-'}</td>
                                </tr>
                            `).join('')}
                        </table>
                    </div>
                `;
            } catch (e) { showToast(e.message, true); }
        }

        function closeModal() { document.getElementById('modal').classList.remove('show'); }

        async function modalSave() {
            try { await modalCallback(); closeModal(); showToast('保存成功'); }
            catch (e) { showToast(e.message, true); }
        }
    </script>
</body>
</html>
